router:
  # Fallback: if primary Z.AI model fails, route to OpenCode Go
  fallbacks:
    - zai-glm-5.1: [opencode-go-deepseek-v4-pro]
    - zai-glm-5: [zai-glm-5.1]
    - zai-glm-5-turbo: [zai-glm-5]
    - glm-5.1: [deepseek-v4-pro]

  # Timeout settings
  timeout: 120
  routing_strategy: simple-shuffle

  # Rate limits (adjust based on your quotas)
  rate_limit_config:
    - model: zai-glm-5.1
      tpm: 100000
      rpm: 60
    - model: opencode-go-deepseek-v4-pro
      tpm: 50000
      rpm: 30

litellm_settings:
  # Turn off success/failure callbacks for local dev
  success_callback: []
  failure_callback: []
  # Allow proxy to return detailed error messages
  verbose: false
  # Set max budget per request (optional)
  max_budget: 10.0
  # Budget alert threshold
  budget_alert: 8.0

# General settings
general_settings:
  # Master key for LiteLLM proxy (optional but recommended)
  # master_key: sk-litellm-master-key
  # Disable UI for headless worker mode
  disable_ui: true
  # Log level
  log_level: info
