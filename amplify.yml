version: 1
applications:
  - appRoot: frontend
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm install 20
            - (cd frontend && npm ci)
        build:
          commands:
            - (cd frontend && echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" > .env.production && npm run build)
      artifacts:
        baseDirectory: frontend/dist
        files:
          - '**/*'
      cache:
        paths:
          - frontend/node_modules/**/*
