model_list:
  - model_name: gpt-5.5
    litellm_params:
      model: openai/gpt-5.5
      api_base: http://127.0.0.1:2455/v1
      api_key: os.environ/CODEX_LB_API_KEY

router:
  fallbacks:
    - gpt-5.5: []

  timeout: 120
  routing_strategy: simple-shuffle

  rate_limit_config:
    - model: gpt-5.5
      tpm: 100000
      rpm: 60

litellm_settings:
  success_callback: []
  failure_callback: []
  verbose: false
  max_budget: 10.0
  budget_alert: 8.0

general_settings:
  disable_ui: true
  log_level: info
