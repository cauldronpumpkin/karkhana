name: Worker app build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: worker-app

jobs:
  windows-build:
    name: Windows Tauri build
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker-app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker-app/src-tauri -> target

      - name: Install WiX Toolset
        run: choco install wixtoolset --no-progress -y

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri release (MSI, NSIS, debug binary)
        run: npx tauri build --bundles msi,nsis

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: worker-app-windows-msi
          path: worker-app/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: worker-app-windows-setup
          path: worker-app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload debug binary
        uses: actions/upload-artifact@v4
        with:
          name: worker-app-windows-debug
          path: worker-app/src-tauri/target/release/*.exe
          if-no-files-found: warn

  macos-build:
    name: macOS Tauri build
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker-app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker-app/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri release (DMG, macOS app)
        run: npx tauri build --bundles dmg,macos

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: worker-app-macos-dmg
          path: worker-app/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload macOS debug binary
        uses: actions/upload-artifact@v4
        with:
          name: worker-app-macos-debug
          path: worker-app/src-tauri/target/release/idearefinery-worker
          if-no-files-found: warn
